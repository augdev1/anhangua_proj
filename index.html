<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Alertas - Anhangua</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 15px;
        }

        h1 { margin: 0; color: var(--primary-color); }
        p.subtitle { color: #7f8c8d; margin-top: 5px; }

        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }

        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            align-self: flex-end;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
        .stat-label { color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f5f9; }

        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; color: white; font-weight: bold; display: inline-block; }
        .src-landsat { background-color: #27ae60; }
        .src-firms { background-color: #e67e22; }
        .src-gfw { background-color: #8e44ad; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌲 Anhangua Monitor</h1>
        <p class="subtitle">Visualização unificada de alertas (GFW, FIRMS, Landsat)</p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label for="days">Dias Recentes</label>
            <input type="number" id="days" value="14" min="1" max="90">
        </div>
        <div class="control-group">
            <label for="limit">Limite de Alertas</label>
            <input type="number" id="limit" value="500" min="10" max="5000">
        </div>
        <button onclick="carregarDados()">🔄 Atualizar</button>
    </div>

    <div class="stats" id="stats-container">
        <!-- Stats injetados via JS -->
    </div>

    <table id="alerts-table">
        <thead>
            <tr>
                <th>Fonte</th>
                <th>Data</th>
                <th>Lat / Lon</th>
                <th>Confiança</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4" style="text-align:center;">Carregue os dados para visualizar.</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function carregarDados() {
        const days = document.getElementById('days').value;
        const limit = document.getElementById('limit').value;
        const tbody = document.querySelector('#alerts-table tbody');
        
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Carregando...</td></tr>';

        try {
            // Chama o endpoint UNIFICADO criado anteriormente
            const res = await fetch(`http://127.0.0.1:8000/alertas/unificado?days=${days}&limit=${limit}`);
            const json = await res.json();
            
            if (json.status !== 'ok') throw new Error("Erro na API");

            const alertas = json.data || [];
            
            // Contagem por fonte
            const counts = { total: alertas.length, gfw: 0, firms: 0, landsat: 0 };

            tbody.innerHTML = '';
            
            if (alertas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Nenhum alerta encontrado.</td></tr>';
                return;
            }

            alertas.forEach(a => {
                const source = (a.source || 'Desconhecido').toLowerCase();
                
                // Incrementa contadores para o resumo
                if (source.includes('landsat') || source.includes('gfw')) counts.gfw++;
                else if (source.includes('firms')) counts.firms++;
                else counts.landsat++; // fallback categorization

                let badgeClass = 'src-gfw';
                if (source.includes('firms')) badgeClass = 'src-firms';
                if (source.includes('landsat')) badgeClass = 'src-landsat';

                const row = `
                    <tr>
                        <td><span class="badge ${badgeClass}">${a.source || 'N/A'}</span></td>
                        <td>${a.alert_date || '-'}</td>
                        <td>${(a.latitude||0).toFixed(4)}, ${(a.longitude||0).toFixed(4)}</td>
                        <td>${a.confidence || '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Atualiza Cards de Estatísticas
            document.getElementById('stats-container').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${counts.total}</div>
                    <div class="stat-label">Total de Alertas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:#27ae60">${counts.gfw}</div>
                    <div class="stat-label">GLAD / Landsat</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:#e67e22">${counts.firms}</div>
                    <div class="stat-label">FIRMS (Fogo)</div>
                </div>
            `;

        } catch (err) {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">Erro ao carregar dados: ${err.message}</td></tr>`;
        }
    }

    // Carrega automaticamente ao abrir
    window.onload = carregarDados;
</script>

</body>
</html>
